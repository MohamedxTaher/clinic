spring.application.name=clinic-system

#  الاتصال الصحيح بـ SQL Server (SQLEXPRESS) مع دعم Unicode/UTF-8
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=clinic_db;encrypt=false;trustServerCertificate=true;characterEncoding=UTF-8;sendStringParametersAsUnicode=true

#  بيانات الدخول
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#  إعدادات Hibernate مع دعم Unicode
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

#  Logging for debugging
logging.level.hana.com.clinic_system=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#  UTF-8 Encoding for Request/Response
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

#  HTTP Message Converter Encoding

